{% extends "base.html" %}

{% block title %}发布商品 - 校园二手交易平台{% endblock %}

{% block content %}
<div class="form-container">
    <h2>发布闲置商品</h2>
    <form method="POST" enctype="multipart/form-data" class="publish-form">
        <div class="form-group">
            <label for="name">商品名称 <span class="required">*</span></label>
            <input type="text" id="name" name="name" required placeholder="例如：二手iPhone 13">
        </div>

        <div class="form-group">
            <label for="category">商品分类 <span class="required">*</span></label>
            <select id="category" name="category" required>
                <option value="">请选择分类</option>
                {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="price">价格（元） <span class="required">*</span></label>
            <input type="number" id="price" name="price" step="0.01" min="0.01" required placeholder="例如：2500.00">
        </div>

        <div class="form-group">
            <label for="contact">联系方式 <span class="required">*</span></label>
            <input type="text" id="contact" name="contact" required placeholder="例如：手机号或微信">
        </div>

        <div class="form-group">
            <label for="description">商品描述</label>
            <textarea id="description" name="description" rows="4" placeholder="描述商品的使用情况、成色等"></textarea>
        </div>

        <div class="form-group">
            <label for="image">商品图片</label>
            <input type="file" id="image" name="image" accept="image/png,image/jpeg,image/gif">
            <small>支持 png、jpg、gif 格式</small>
            <div id="image-preview"></div>
        </div>

        <button type="submit" class="btn-submit">发布商品</button>
    </form>
</div>

<script>
// 图片预览
document.getElementById('image').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const preview = document.getElementById('image-preview');
    
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.innerHTML = `<img src="${e.target.result}" alt="预览">`;
        };
        reader.readAsDataURL(file);
    } else {
        preview.innerHTML = '';
    }
});
</script>
{% endblock %}
